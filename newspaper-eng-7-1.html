<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Glamour Weekly | 7th Edition English A</title>

    <style>
        :root {
            --ink: #111111;
            --paper: #f5f3ef;
            --white: #ffffff;
            --red: #9f0000;
            --pink: #d41463;
            --line: #d7d7d7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }

        .article-topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--line);
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            font-family: "Helvetica Neue", Arial, sans-serif;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }

        .article-brand {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--red);
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-button {
            display: inline-block;
            padding: 9px 13px;
            background: var(--ink);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-radius: 2px;
        }

        .nav-button.next {
            background: var(--pink);
        }

        .nav-button:hover {
            filter: brightness(1.1);
        }

        .page-wrap {
            max-width: 1220px;
            margin: 0 auto;
            padding: 28px 18px 46px;
        }

        .edition-note {
            background: var(--white);
            border: 1px solid var(--line);
            padding: 16px 18px;
            margin-bottom: 22px;
            text-align: center;
            line-height: 1.5;
        }

        .edition-note h1 {
            margin: 0 0 8px;
            font-size: clamp(1.7rem, 4vw, 3rem);
            text-transform: uppercase;
            line-height: 1.05;
        }

        .edition-note p {
            margin: 0;
            color: #444;
            font-size: 1rem;
        }

        .newspaper-frame {
            background: var(--white);
            border: 1px solid #c8c8c8;
            padding: 14px;
            box-shadow: 0 18px 42px rgba(0,0,0,0.18);
        }

        .newspaper-frame img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            background: #ffffff;
        }

        @media (max-width: 720px) {
            .article-topbar {
                position: static;
                align-items: flex-start;
                flex-direction: column;
            }

            .button-row {
                justify-content: flex-start;
            }

            .page-wrap {
                padding-left: 10px;
                padding-right: 10px;
            }

            .newspaper-frame {
                padding: 6px;
            }
        }
    </style>
</head>

<body>

    <div class="article-topbar">
        <div class="article-brand">Doghouse Media Group • 7th Edition</div>

        <div class="button-row">
            <a class="nav-button" href="index.html">Back to Homepage</a>
            <a class="nav-button next" href="newspaper-eng-7-2.html">Read English Edition B</a>
        </div>
    </div>

    <main class="page-wrap">
        <section class="edition-note">
            <h1>Global Glamour Weekly — English 7th Edition A</h1>
            <p>Next button cycles to English Edition B, then back to the Vietnamese edition.</p>
        </section>

        <section class="newspaper-frame">
            <img src="newspaper-eng-7-1.png" alt="English seventh edition A full newspaper image">
        </section>
    </main>

</body>
</html>
